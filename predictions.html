<!DOCTYPE html>
<html lang="ru">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>SG TOURNAMENT #2 | PREDICTIONS</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="icon" href="https://cdn.discordapp.com/attachments/900998594583207957/1478761428453425162/Picsart_26-03-04_19-29-44-302.png">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />


  <style>
    :root {
      --base-accent: #38bdf8;
    }

    body {
      background: radial-gradient(circle at top center, #0a192f 0%, #000000 100%);
      background-attachment: fixed;
    }

    .top-nav {
      position: sticky;
      top: 0;
      backdrop-filter: blur(14px);
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-size: 11px;
    }

    .nav-link.active {
      border-color: rgba(255, 45, 45, 0.55);
      background: rgba(255, 45, 45, 0.08);
    }

    .card {
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(24, 24, 27, 0.35);
      border-radius: 24px;
    }

    .pill {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .live-dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ff2d2d;
      box-shadow: 0 0 12px rgba(255,45,45,0.55);
      position: relative;
      flex: 0 0 auto;
    }
    .live-dot::after{
      content:"";
      position:absolute;
      inset:-7px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,0.45);
      animation: pulse 1.5s ease-out infinite;
    }
  </style>

</head>


<body class="text-white font-sans min-h-screen">

  <!-- NAV -->

  <div class="top-nav">
    <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-white/80 font-black tracking-[0.22em] text-[10px] uppercase">SG Tournament</span>
        <span class="opacity-20">|</span>
        <span class="text-white/55 text-[10px] uppercase tracking-[0.22em]">Hub</span>
      </div>
      <nav class="flex gap-3">
        <a class="nav-link" href="index.html">Teams</a>
        <a class="nav-link" href="live.html"><span class="live-dot" aria-hidden="true"></span>LIVE</a>
        <a class="nav-link" href="bracket.html" aria-current="page">Bracket</a>
        <a class="nav-link active" href="predictions.html">Predictions</a>

      </nav>

    </div>

  </div>


  <!-- HEADER -->

  <header class="text-center py-14">

    <h1 class="text-5xl font-black tracking-tight animate__animated animate__fadeInDown">

      FINAL <span class="text-red-400">PREDICTION</span>

    </h1>

    <p class="mt-4 text-white/40 uppercase tracking-[0.28em] text-[10px]">

      Predict the score of the final match

    </p>

  </header>



  <main class="max-w-4xl mx-auto px-6 pb-16 space-y-8">


    <!-- MATCH CARD -->

    <div class="card p-8 animate__animated animate__fadeInUp">

      <div class="flex justify-between mb-6">

        <div class="flex gap-2">

          <span class="pill">Bo3</span>

          <span class="pill">FINAL</span>

          <span class="pill">15 Mar 2026</span>

        </div>

        <div class="text-yellow-400 text-[11px] uppercase tracking-[0.2em]">

          Prediction

        </div>

      </div>


      <div class="grid md:grid-cols-3 items-center gap-4">


        <div class="text-center md:text-left">

          <div class="text-white/60 text-[10px] uppercase tracking-[0.26em]">

            Team A

          </div>

          <div class="text-3xl font-black mt-1">

            PEPEVISION

          </div>

          <input id="scoreA" type="number" min="0" max="3" class="mt-3 w-20 text-center bg-black/40 border border-white/10 rounded p-2" />

        </div>



        <div class="text-center">

          <div class="text-white/40 text-[11px] uppercase tracking-[0.26em] mb-2">

            Score

          </div>

          <div class="text-4xl font-black">

            :

          </div>

        </div>



        <div class="text-center md:text-right">

          <div class="text-white/60 text-[10px] uppercase tracking-[0.26em]">

            Team B

          </div>

          <div class="text-3xl font-black mt-1">

            LazzyTeam

          </div>

          <input id="scoreB" type="number" min="0" max="3" class="mt-3 w-20 text-center bg-black/40 border border-white/10 rounded p-2" />

        </div>

      </div>



      <button onclick="sendPrediction()" class="mt-8 w-full bg-red-600 hover:bg-red-700 p-3 rounded-xl font-bold uppercase tracking-wider">

        Submit prediction

      </button>

    </div>



    <!-- COMMUNITY TABLE -->

    <div class="card p-6">

      <h2 class="text-xl font-bold mb-4">

        Community predictions

      </h2>

      <table class="w-full">

        <thead class="text-white/50 text-sm">

          <tr>

            <th class="text-left p-2">User</th>

            <th class="text-left p-2">Prediction</th>

          </tr>

        </thead>

        <tbody id="predictionsTable">

        </tbody>

      </table>

    </div>

  </main>



  <script>
    const tg = window.Telegram?.WebApp

    if (!tg) {
      alert("Telegram WebApp не найден")
    }

    tg.expand()

    const user = tg?.initDataUnsafe?.user



    async function sendPrediction() {

      const scoreA = parseInt(document.getElementById("scoreA").value)
      const scoreB = parseInt(document.getElementById("scoreB").value)

      if (isNaN(scoreA) || isNaN(scoreB)) {
        alert("Введите счёт")
        return
      }

      if (scoreA < 0 || scoreA > 2 || scoreB < 0 || scoreB > 2) {
        alert("Можно вводить только 0, 1 или 2")
        return
      }

      if (scoreA !== 2 && scoreB !== 2) {
        alert("В финале Bo3 одна из команд должна иметь 2 победы")
        return
      }

      if (scoreA === 2 && scoreB === 2) {
        alert("Счёт 2:2 невозможен")
        return
      }

      try {

        if (!user) {
          alert("Telegram user не найден")
          return
        }

        const data = {
          telegram_id: user.id,
          username: user.username || user.first_name,
          name: user.first_name + " " + (user.last_name || ""),
          scoreA: scoreA,
          scoreB: scoreB
        }

        console.log("Отправка:", data)

        const res = await fetch("https://script.google.com/macros/s/AKfycbyf6_2Rc4zIAtq7bdshfXFYkgxHG8hg4D6TcuZXIXbhkr1HALtygT0blrlFeBys_YXiXA/exec", {
          method: "POST",
          body: JSON.stringify(data)
        })

        const text = await res.text()

        let result = {}

        try {
          result = JSON.parse(text)
        } catch {
          console.log("Ответ сервера:", text)
        }

        console.log("Ответ сервера:", result)

        if (result.status === "already") {
          alert("Вы уже отправили предикт!")
          return
        }

        addPredictionRow(data)

        alert("Prediction submitted!")

      } catch (error) {

        console.error(error)

        alert("Ошибка отправки предикта")

      }

    }



    function addPredictionRow(data) {

      const row = document.createElement("tr")

      row.innerHTML = `

<td class="p-2 border-t border-white/10">${data.username}</td>

<td class="p-2 border-t border-white/10">${data.scoreA} : ${data.scoreB}</td>

`

      document.getElementById("predictionsTable").appendChild(row)

    }
  </script>

</body>

</html>>
